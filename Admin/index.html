<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — MediCare Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: #1e293b; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; }
        .icon { width: 64px; height: 64px; background: #faf5ff; color: #a855f7; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #64748b; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 24px; padding: 12px 24px; background: #a855f7; color: white; text-decoration: none; border-radius: 12px; font-weight: 600; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i data-lucide="shield-check"></i></div>
        <h1>Admin Dashboard</h1>
        <p>Welcome to the administrator portal. You have full access to manage hospital records, doctor schedules, and patient data.</p>
        <a href="../login page/frontend/index.html" class="btn">Sign Out</a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
